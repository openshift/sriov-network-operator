apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.openshift.io: https://github.com/openshift/api/pull/470
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
  name: apiservers.config.openshift.io
spec:
  group: config.openshift.io
  names:
    kind: APIServer
    listKind: APIServerList
    plural: apiservers
    singular: apiserver
  scope: Cluster
  versions:
    - name: v1
      schema:
        openAPIV3Schema:
          description: "APIServer holds configuration shared by all API servers."
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: spec holds user settable values for configuration
              type: object
              properties:
                additionalCORSAllowedOrigins:
                  type: array
                  items:
                    type: string
                audit:
                  type: object
                  properties:
                    customRules:
                      type: array
                      items:
                        type: object
                        properties:
                          group:
                            type: string
                          profile:
                            type: string
                    profile:
                      type: string
                clientCA:
                  type: object
                  properties:
                    name:
                      type: string
                encryption:
                  type: object
                  properties:
                    type:
                      type: string
                servingCerts:
                  type: object
                  properties:
                    namedCertificates:
                      type: array
                      items:
                        type: object
                        properties:
                          names:
                            type: array
                            items:
                              type: string
                          servingCertificate:
                            type: object
                            properties:
                              name:
                                type: string
                tlsSecurityProfile:
                  type: object
                  properties:
                    type:
                      type: string
                    old:
                      type: object
                      nullable: true
                    intermediate:
                      type: object
                      nullable: true
                    modern:
                      type: object
                      nullable: true
                    custom:
                      type: object
                      nullable: true
                      properties:
                        ciphers:
                          type: array
                          items:
                            type: string
                        minTLSVersion:
                          type: string
                tlsAdherence:
                  description: "Controls if components adhere to the TLS security profile."
                  type: string
            status:
              type: object
      served: true
      storage: true
      subresources:
        status: {}
